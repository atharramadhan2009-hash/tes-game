<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>

<div class="bg-overlay"></div>

<div class="profile-container">

    <!-- Sidebar -->
    <aside class="sidebar glass">
        <div class="menu active">Profil</div>
        <div class="menu">Album</div>
        <div class="menu">Koleksi</div>
        <div class="menu">Battlefield</div>
        <div class="menu">Sosial</div>
    </aside>

    <!-- Main -->
    <main class="main">

        <div class="top-title">
            <h2>Zona Pribadi <span id="profileName" class="highlight"></span></h2>
        </div>

        <section class="profile-card glass">

            <div class="left-profile">
                <div class="avatar-glow">
                    <img src="avatar.jpg" alt="avatar">
                </div>

                <div class="player-info">
                    <h3 id="playerName"></h3>
                    <p id="playerServer"></p>
                    <p id="playerLocation"></p>
                    <p class="clan" id="playerClan"></p>
                </div>
            </div>

            <div class="rank-grid">
                <div class="rank-box">Rank Saat Ini</div>
                <div class="rank-box">Rank Tertinggi</div>
            </div>

        </section>

        <div class="stats glass">
            <div>Total Pertandingan: <span id="totalMatch"></span></div>
            <div>Like: <span id="totalLike"></span></div>
        </div>

    </main>

    <!-- Right Panel -->
    <aside class="right-panel glass">
        Player belum mengunggah foto
    </aside>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const player = JSON.parse(localStorage.getItem("playerData"));

    if(player){
        document.getElementById("profileName").textContent = player.username;
        document.getElementById("playerName").textContent = player.username;
        document.getElementById("playerServer").textContent = "Server: " + player.server;
        document.getElementById("playerLocation").textContent = player.location;
        document.getElementById("playerClan").textContent = player.clan;
        document.getElementById("totalMatch").textContent = player.match;
        document.getElementById("totalLike").textContent = player.like;
    }

});
</script>

</body>
</html>
